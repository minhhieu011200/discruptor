spring.application.name=demo
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

spring.data.redis.host=192.168.18.203
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000

spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2

spring.datasource.url=jdbc:postgresql://192.168.18.213:5432/FXOnline
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Bật SQL statement
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Hoặc bật debug cho MyBatis qua Spring Boot logging
logging.level.com.example.demo.infrastructure.mybatis.TranslogMapper=DEBUG
logging.level.org.mybatis=DEBUG
logging.level.org.mybatis.spring=DEBUG
